  function featureHtml(doc) {
    return [
      '<div class="m45-research-label research-label">Featured</div>',
      '<h2 class="m45-research-feature-title research-feature-title">' + escapeHtml(doc.title) + "</h2>",
      '<p class="m45-research-feature-body research-feature-body">' + escapeHtml(doc.summary) + "</p>",
      '<div class="m45-research-meta ri-meta research-meta">' + escapeHtml(doc.type + " - " + doc.month) + "</div>",
      '<div class="m45-feature-actions ri-feature-actions">',
      '<a class="m45-research-link research-link-white" data-m45-pdf data-m45-doc="' +
        escapeHtml(doc.slug) +
        '" href="' +
        escapeHtml(doc.pdfUrl) +
        '">View PDF <span>-></span></a>',
      '<button class="m45-share-btn m45-feature-share" type="button" data-m45-share="' +
        escapeHtml(doc.slug) +
        '">Share</button>',
      "</div>",
    ].join("");
  }

  function cardHtml(doc) {
    return [
      '<article class="ri-card research-card-native" data-type="' + escapeHtml(doc.type) + '">',
      "<div>",
      "<h3>" + escapeHtml(doc.title) + "</h3>",
      "<p>" + escapeHtml(doc.summary) + "</p>",
      "</div>",
      '<div class="ri-card-foot">',
      '<span class="ri-meta research-meta">' + escapeHtml(doc.type + " - " + doc.month) + "</span>",
      '<span class="ri-card-actions">',
      '<a data-m45-pdf data-m45-doc="' + escapeHtml(doc.slug) + '" href="' + escapeHtml(doc.pdfUrl) + '">View PDF</a>',
      '<button class="m45-share-btn" type="button" data-m45-share="' + escapeHtml(doc.slug) + '">Share</button>',
      "</span>",
      "</div>",
      "</article>",
    ].join("");
  }

  function controlHtml() {
    return ["All", "Whitepapers", "Value-Chain", "Company", "Others"]
      .map(function (name, index) {
        return (
          '<button class="ri-filter' +
          (index === 0 ? " active" : "") +
          '" type="button" data-filter="' +
          escapeHtml(name) +
          '">' +
          escapeHtml(name) +
          "</button>"
        );
      })
      .join("");
  }

  function renderResearchPage() {
    if (!isResearchContext()) return false;

    var feature = document.querySelector(".research-feature-native,.ri-feature");
    var art = document.querySelector(".research-feature-art,.ri-feature-art");
    var copy = document.querySelector(".research-feature-copy,.ri-feature-copy");
    var controls = document.querySelector(".research-controls-native,.ri-controls");
    var grid = document.querySelector(".research-grid-native,.ri-grid");

    if (!feature && !art && !copy && !controls && !grid) return false;

    document.body.classList.add("ri-page", "m45-research-canonical");
    researchStyles();

    if (feature) feature.classList.add("ri-feature");
    if (art) {
      art.classList.add("ri-feature-art");
      if (art.dataset.m45ResearchCanonical !== "20260707" || art.textContent.indexOf("A short note on how we think") < 0) {
        art.dataset.m45ResearchCanonical = "20260707";
        art.innerHTML =
          '<div class="m45-featured-teaser-label">The M45 Way</div><p class="m45-featured-teaser-body">' +
          escapeHtml(FEATURE_TEASER) +
          "</p>";
      }
    }

    if (copy) {
      copy.classList.add("ri-feature-copy");
      if (
        copy.dataset.m45ResearchCanonical !== "20260707" ||
        copy.textContent.indexOf("Share") < 0 ||
        copy.textContent.indexOf("Fundamental Research") >= 0
      ) {
        copy.dataset.m45ResearchCanonical = "20260707";
        copy.innerHTML = featureHtml(RESEARCH_DOCS[0]);
      }
    }

    if (controls) {
      controls.classList.add("ri-controls");
      if (controls.dataset.m45ResearchCanonical !== "20260707") {
        controls.dataset.m45ResearchCanonical = "20260707";
        controls.innerHTML = controlHtml();
      }
    }

    if (grid) {
      grid.classList.add("ri-grid");
      if (grid.dataset.m45ResearchCanonical !== "20260707") {
        grid.dataset.m45ResearchCanonical = "20260707";
        grid.innerHTML = RESEARCH_DOCS.map(cardHtml).join("");
      }
    }

    bindResearchFilters();
    syncResearchShareLinks();
    openSharedPaperIfRequested();
    return true;
  }

  function bindResearchFilters() {
    Array.prototype.forEach.call(document.querySelectorAll(".ri-filter"), function (button) {
      if (button.dataset.m45FilterBound === "1") return;
      button.dataset.m45FilterBound = "1";
      button.addEventListener("click", function () {
        var filter = button.getAttribute("data-filter") || "All";
        var grid = document.querySelector(".ri-grid,.research-grid-native");
        Array.prototype.forEach.call(document.querySelectorAll(".ri-filter"), function (other) {
          other.classList.toggle("active", other === button);
        });
        if (grid) {
          grid.classList.add("ri-filtering");
          setTimeout(function () {
            grid.classList.remove("ri-filtering");
          }, 180);
        }
        Array.prototype.forEach.call(document.querySelectorAll(".ri-card,.research-card-native"), function (card) {
          card.classList.toggle("hide", filter !== "All" && card.getAttribute("data-type") !== filter);
        });
      });
    });
  }

  function ensureSharePopover() {
    var popover = document.getElementById("m45-share-popover");
    if (popover) return popover;

    popover = document.createElement("div");
    popover.id = "m45-share-popover";
    popover.className = "m45-share-popover";
    popover.hidden = true;
    popover.innerHTML = [
      '<button class="m45-share-close" type="button" aria-label="Close share menu">x</button>',
      '<p class="m45-share-popover-title"></p>',
      '<p class="m45-share-popover-text"></p>',
      '<div class="m45-share-popover-actions">',
      '<button type="button" data-m45-share-copy>Copy link</button>',
      '<a class="m45-share-icon" data-m45-share-linkedin target="_blank" rel="noopener" aria-label="Share on LinkedIn" title="Share on LinkedIn">in</a>',
      '<a class="m45-share-icon" data-m45-share-whatsapp target="_blank" rel="noopener" aria-label="Share on WhatsApp" title="Share on WhatsApp">wa</a>',
      "</div>",
    ].join("");
    document.body.appendChild(popover);

    popover.querySelector(".m45-share-close").addEventListener("click", function () {
      popover.hidden = true;
    });

    popover.querySelector("[data-m45-share-copy]").addEventListener("click", function () {
      var button = this;
      if (navigator.clipboard) navigator.clipboard.writeText(popover.dataset.url || PRODUCTION_ORIGIN + "/research-insights");
      button.textContent = "Copied";
      setTimeout(function () {
        button.textContent = "Copy link";
      }, 1200);
    });

    document.addEventListener(
      "click",
      function (event) {
        if (
          !popover.hidden &&
          !popover.contains(event.target) &&
          !(event.target.closest && event.target.closest("[data-m45-share]"))
        ) {
          popover.hidden = true;
        }
      },
      true
    );

    return popover;
  }

  function openShare(doc, button) {
    var shareUrl = paperShareUrl(doc);
    var shareText = doc.title + " - " + doc.summary;
    var nativePayload = {
      title: doc.title + " | M45 Capital Partners",
      text: doc.summary,
      url: shareUrl,
    };

    if (navigator.share && isMobileWidth()) {
      navigator.share(nativePayload).catch(function () {
        openSharePopover(doc, button, shareUrl, shareText);
      });
      return;
    }

    openSharePopover(doc, button, shareUrl, shareText);
  }

  function openSharePopover(doc, button, shareUrl, shareText) {
    var popover = ensureSharePopover();
    popover.dataset.url = shareUrl;
    popover.querySelector(".m45-share-popover-title").textContent = doc.title;
    popover.querySelector(".m45-share-popover-text").textContent = doc.summary;
    popover.querySelector("[data-m45-share-linkedin]").href =
      "https://www.linkedin.com/sharing/share-offsite/?url=" + encodeURIComponent(shareUrl);
    popover.querySelector("[data-m45-share-whatsapp]").href =
      "https://wa.me/?text=" + encodeURIComponent(shareText + " " + shareUrl);
    popover.hidden = false;

    if (isMobileWidth()) return;

    var rect = button.getBoundingClientRect();
    var width = popover.offsetWidth;
    var height = popover.offsetHeight;
    popover.style.left = Math.max(18, Math.min(innerWidth - width - 18, rect.left - width + button.offsetWidth)) + "px";
    popover.style.top = Math.max(18, Math.min(innerHeight - height - 18, rect.bottom + 14)) + "px";
  }

  function syncResearchShareLinks() {
    Array.prototype.forEach.call(document.querySelectorAll("[data-m45-share]"), function (button) {
      if (button.dataset.m45ShareBound === "1") return;
      button.dataset.m45ShareBound = "1";
      button.addEventListener("click", function (event) {
        event.preventDefault();
        event.stopPropagation();
        openShare(docBySlug(button.getAttribute("data-m45-share")), button);
      });
    });

    Array.prototype.forEach.call(document.querySelectorAll("[data-m45-pdf]"), function (link) {
      var doc = docBySlug(link.getAttribute("data-m45-doc"));
      link.dataset.riShareSlug = doc.slug;
      link.setAttribute("aria-label", "View " + doc.title + " PDF");
    });
  }

  function ensurePdfReader() {
    var reader = document.getElementById("ri-pdf-reader");
    if (reader) return reader;

    reader = document.createElement("div");
    reader.id = "ri-pdf-reader";
    reader.className = "ri-pdf-reader";
    reader.setAttribute("role", "dialog");
    reader.setAttribute("aria-modal", "true");
    reader.setAttribute("aria-label", "PDF reader");
    reader.innerHTML = [
      '<div class="ri-pdf-panel" role="document">',
      '<div class="ri-pdf-top">',
      '<p class="ri-pdf-title">M45 Research</p>',
      '<a class="ri-pdf-open-link" href="#" target="_blank" rel="noopener">Open PDF</a>',
      '<button class="ri-pdf-close" type="button" aria-label="Close PDF reader"></button>',
      "</div>",
      '<iframe class="ri-pdf-frame" title="M45 Research PDF" loading="lazy"></iframe>',
      "</div>",
    ].join("");
    document.body.appendChild(reader);

    reader.addEventListener("click", function (event) {
      if (event.target === reader || event.target.closest(".ri-pdf-close")) closePdfReader();
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") closePdfReader();
    });

    return reader;
  }

  function closePdfReader() {
    var reader = document.getElementById("ri-pdf-reader");
    if (!reader) return;
    reader.classList.remove("is-open");
    document.body.classList.remove("ri-pdf-open");
  }

  function openPdfReader(link, event) {
    if (!link || !/\.pdf(?:$|[?#])/i.test(link.href)) return;
    if (!isResearchContext()) return;
    if (isMobileWidth()) {
      link.target = "_self";
      return;
    }

    event.preventDefault();
    event.stopPropagation();
    if (event.stopImmediatePropagation) event.stopImmediatePropagation();

    var doc = docBySlug(link.getAttribute("data-m45-doc") || link.dataset.riShareSlug);
    var reader = ensurePdfReader();
    var frame = reader.querySelector(".ri-pdf-frame");
    reader.querySelector(".ri-pdf-title").textContent = doc.title;
    reader.querySelector(".ri-pdf-open-link").href = link.href;
    frame.title = doc.title + " PDF";
    frame.src = link.href + "#toolbar=1&navpanes=0&view=FitH";
    reader.classList.add("is-open");
    document.body.classList.add("ri-pdf-open");
    var close = reader.querySelector(".ri-pdf-close");
    if (close) close.focus();
  }

  function bindPdfLinks() {
    document.addEventListener(
      "click",
      function (event) {
        var link = event.target.closest && event.target.closest('a[href*=".pdf"]');
        if (link) openPdfReader(link, event);
      },
      true
    );
  }

  function openSharedPaperIfRequested() {
    var paper = new URLSearchParams(location.search).get("paper");
    if (!paper || document.documentElement.dataset.m45OpenedSharedPaper === paper) return;
    document.documentElement.dataset.m45OpenedSharedPaper = paper;
    setTimeout(function () {
      var link = document.querySelector('[data-m45-doc="' + paper.replace(/"/g, '\\"') + '"]');
      if (!link) return;
      var block = link.closest(".ri-card,.research-card-native,.ri-feature,.research-feature-native") || link;
      block.scrollIntoView({ behavior: "smooth", block: "center" });
      if (isMobileWidth()) {
        setTimeout(function () {
          location.assign(link.href);
        }, 250);
      } else {
        setTimeout(function () {
          link.click();
        }, 500);
      }
    }, 550);
  }

  function normalizeNav() {
    injectStyle(
      "m45-nav-canonical-20260707-style",
      [
        "@media(min-width:992px){.navbar-linkcontainer.w-nav-menu{display:flex!important;align-items:flex-start!important;gap:45px!important;white-space:nowrap!important}.navbar-linkcontainer.w-nav-menu .navbar-linkwrapper{display:inline-flex!important;white-space:nowrap!important;margin-right:0!important}.navbar-linkcontainer.w-nav-menu .m45-research-navwrapper{margin-left:0!important;margin-right:0!important;padding:0!important}.navbar-linkcontainer.w-nav-menu .navlink,.navbar-linkcontainer.w-nav-menu .m45-research-navlink,.navbar-contactus-container .contactus-btn,.ri-nav .ri-links a:not(.ri-mobile-close):not(.ri-mobile-email),.ri-nav .ri-wd-contact.linebtn.arrowleftbtn{font-family:Ovo,serif!important;font-size:18.375px!important;line-height:25.375px!important;font-weight:400!important;letter-spacing:0!important;text-decoration:none!important}.navbar-linkcontainer.w-nav-menu .navlink,.navbar-linkcontainer.w-nav-menu .m45-research-navlink,.ri-nav .ri-links a:not(.ri-mobile-close):not(.ri-mobile-email){display:inline-block!important;padding:8px 0!important;border-bottom:1px solid transparent!important}.navbar-linkcontainer.w-nav-menu .m45-research-navlink{color:#292f40!important;animation:m45NavFadeIn .55s ease both}.navbar-linkcontainer.w-nav-menu .navbar-linkwrapper-solstice .m45-research-navlink,.navbar-linkcontainer.w-nav-menu .m45-research-navlink.navlink-solstice{color:#f4f7f9!important}.navbar-linkcontainer.w-nav-menu .navlink:hover,.navbar-linkcontainer.w-nav-menu .navlink.w--current,.navbar-linkcontainer.w-nav-menu .m45-research-navlink:hover,.navbar-linkcontainer.w-nav-menu .m45-research-navlink.w--current,.ri-nav .ri-links a:not(.ri-mobile-close):not(.ri-mobile-email):hover,.ri-nav .ri-links a:not(.ri-mobile-close):not(.ri-mobile-email).active,.ri-nav .ri-links a:not(.ri-mobile-close):not(.ri-mobile-email).w--current{border-bottom-color:currentColor!important}@keyframes m45NavFadeIn{from{opacity:0}to{opacity:1}}body.ri-page .ri-nav{padding-left:70px!important;padding-right:70px!important;gap:65px!important}body.ri-page .ri-links{display:flex!important;flex-wrap:nowrap!important;gap:45px!important;align-items:flex-start!important;padding-top:8px!important;white-space:nowrap!important}body.ri-page .ri-contact-wrap{padding-top:8px!important;margin-left:auto!important}}",
      ].join("")
    );

    Array.prototype.forEach.call(document.querySelectorAll(".navbar-linkcontainer.w-nav-menu"), normalizeWebflowMenu);
    var researchLinks = document.querySelector(".ri-nav .ri-links");
    if (researchLinks) normalizeResearchMenu(researchLinks);
  }

  function normalizeWebflowMenu(menu) {
    if (menu.dataset.m45NavCanonical === "20260707-nav2" && menu.querySelectorAll(".m45-research-navlink").length === 1) {
      return;
    }

    var anchors = Array.prototype.slice.call(menu.querySelectorAll("a"));
    anchors.forEach(function (anchor) {
      var labelByPath = {
        "/our-investment-philosophy": "Our Investment Philosophy",
        "/what-we-do": "What We Do",
        "/our-leadership": "Our Leadership",
        "/newsroom": "Newsroom",
      }[hrefPath(anchor)];
      if (labelByPath) anchor.textContent = labelByPath;
    });

    anchors.forEach(function (anchor) {
      if (textOf(anchor).toLowerCase() !== "research & insights" && hrefPath(anchor) !== "/research-insights") return;
      var wrapper = anchor.closest(".navbar-linkwrapper");
      if (wrapper && wrapper.parentNode === menu && wrapper.querySelectorAll("a").length <= 1) wrapper.remove();
      else anchor.remove();
    });

    var news = Array.prototype.slice.call(menu.querySelectorAll("a")).filter(function (anchor) {
      return hrefPath(anchor) === "/newsroom" || textOf(anchor).toLowerCase() === "newsroom";
    })[0];
    var referenceWrapper = news && news.closest(".navbar-linkwrapper");
    var referenceLink = news || Array.prototype.slice.call(menu.querySelectorAll("a.navlink,a.w-nav-link"))[0];
    var link = document.createElement("a");
    link.className = referenceLink ? referenceLink.className.replace(/\bw--current\b/g, "").replace(/\s+/g, " ").trim() : "navlink w-nav-link";
    link.classList.add("navlink", "w-nav-link", "m45-research-navlink");
    link.href = "/research-insights";
    link.textContent = "Research & Insights";
    if (pathName() === "/research-insights") {
      link.classList.add("w--current");
      link.setAttribute("aria-current", "page");
    }
    if (news && referenceWrapper && referenceWrapper.querySelectorAll("a.navlink,a.w-nav-link").length > 1) {
      news.insertAdjacentElement("afterend", link);
    } else {
      var wrapper = document.createElement("div");
      wrapper.className = referenceWrapper ? referenceWrapper.className : "navbar-linkwrapper";
      if (wrapper.className.indexOf("navbar-linkwrapper") < 0) wrapper.className += " navbar-linkwrapper";
      wrapper.classList.add("m45-research-navwrapper");
      wrapper.appendChild(link);
      if (referenceWrapper) referenceWrapper.insertAdjacentElement("afterend", wrapper);
      else menu.appendChild(wrapper);
    }

    menu.dataset.m45NavCanonical = "20260707-nav2";
  }

  function normalizeResearchMenu(menu) {
    if (menu.dataset.m45NavCanonical === "20260707" && menu.querySelectorAll(".m45-research-navlink").length === 1) {
      return;
    }

    Array.prototype.slice.call(menu.querySelectorAll("a")).forEach(function (anchor) {
      if (textOf(anchor).toLowerCase() === "research & insights" || hrefPath(anchor) === "/research-insights") anchor.remove();
    });
    var link = document.createElement("a");
    link.className = "m45-research-navlink";
    link.href = "/research-insights";
    link.textContent = "Research & Insights";
    if (pathName() === "/research-insights") {
      link.classList.add("w--current", "active");
      link.setAttribute("aria-current", "page");
    }
    var news = Array.prototype.slice.call(menu.querySelectorAll("a")).filter(function (anchor) {
      return textOf(anchor).toLowerCase() === "newsroom" || hrefPath(anchor) === "/newsroom";
    })[0];
    if (news) news.insertAdjacentElement("afterend", link);
    else menu.appendChild(link);

    menu.dataset.m45NavCanonical = "20260707";
  }

  function patchMapLinks() {
    Array.prototype.forEach.call(document.querySelectorAll("a"), function (link) {
      var label = textOf(link).toLowerCase();
      var href = link.getAttribute("href") || "";
      if (label !== "locate us" && !link.classList.contains("landing-contact-btn") && href.indexOf("maps.app.goo.gl") < 0) return;
      link.href = MAP_URL;
      link.target = "_blank";
      link.rel = "noopener";
    });
  }

  function fixMobileMenuArrows() {
    if (window.matchMedia && !window.matchMedia("(max-width: 991px)").matches) return;
    Array.prototype.forEach.call(document.querySelectorAll(".navbar-linkwrapper"), function (wrapper) {
      var arrow = wrapper.querySelector(".mobilemenu-arrowdiv");
      if (arrow && wrapper.firstElementChild !== arrow) wrapper.insertBefore(arrow, wrapper.firstElementChild);
    });
  }

  function run() {
    normalizeNav();
    patchMapLinks();
    fixMobileMenuArrows();
    renderResearchPage();
  }

  maybeRedirectPaperPages();
  bindPdfLinks();

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", run);
  else run();

  [50, 150, 300, 700, 1200, 2200, 4200, 7000].forEach(function (delay) {
    setTimeout(run, delay);
  });

  window.addEventListener("resize", function () {
    normalizeNav();
    fixMobileMenuArrows();
  });

  new MutationObserver(function () {
    requestAnimationFrame(run);
  }).observe(document.documentElement, { childList: true, subtree: true });
})();

</script>
